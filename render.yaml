services:
  - type: web
    name: buddyscript-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Secrets — set values in the Render dashboard (sync: false = not stored in repo).
      - key: ConnectionStrings__Default
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false
